name: Publish

on:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    name: Publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
          scope: "@aliou"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build processes dist
        run: pnpm --filter @aliou/pi-processes build

      - name: Create Release PR or Publish
        id: changesets
        uses: changesets/action@v1
        with:
          version: pnpm changeset version
          publish: pnpm changeset publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub releases
        if: steps.changesets.outputs.published == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PUBLISHED_PACKAGES: ${{ steps.changesets.outputs.publishedPackages }}
        run: |
          node <<'NODE'
          const { execSync } = require("node:child_process");

          const published = JSON.parse(process.env.PUBLISHED_PACKAGES || "[]");

          for (const pkg of published) {
            const shortName = pkg.name.replace(/^@[^/]+\//, "");
            const tag = `${shortName}@${pkg.version}`;

            const existing = execSync(`git tag --list ${tag}`, { encoding: "utf8" }).trim();
            if (!existing) {
              execSync(`git tag ${tag}`);
              execSync(`git push origin ${tag}`);
            }

            execSync(`gh release create ${tag} --title ${tag} --notes "Release ${tag}"`, {
              stdio: "inherit",
            });
          }
          NODE
